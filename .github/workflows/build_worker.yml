name: Build Docker Image
run-name: build on branch ${{ github.ref_name }} triggered by @${{ github.actor}}
on:
  workflow_dispatch:
  push:
    branches:
      - stable
      - dev
  pull_request:
    branches:
      - stable
      - dev
  schedule:
    - cron: "0 13 * * 1"
# you can build manually on dev, but we do not want to spam the worker
# see here: https://github.scch.at/Land-OOE/prolog-landesabgabe/actions/workflows/docker-image.yml

jobs:
  build:
    runs-on:
    - fast
    - KRAKAU
    steps:
    # @see https://stackoverflow.com/a/72959712/8179249
    - name: Extract branch name
      shell: bash
      run: |
        branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
        branch="${branch//\//_}"
        echo "branch=$branch" >> $GITHUB_OUTPUT
      id: fetch_branch
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Delete previous Backend builds
      uses: actions/delete-package-versions@v4
      continue-on-error: true
      with:
        package-name: 'lx-worker'
        package-type: 'container'
        min-versions-to-keep: 10
    - name: Login to github container registry
      uses: docker/login-action@v2
      with:
        registry: containers.github.scch.at
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Extract metadata (tags, labels) for backend
      id: backend-meta
      uses: docker/metadata-action@v4
      with:
        images: containers.github.scch.at/Land-OOE/lx-worker
        tags: |
            type=ref,event=branch,suffix=-{{ date -s }}
            type=ref,event=tag,suffix=-{{ date -s }}
    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        push: ${{ github.event_name != 'pull_request' }}
        file: ./Sources/Docker/Dockerfile
        context: .
        platforms: linux/amd64
        cache-from: type=registry,ref=user/app:latest
        cache-to: type=inline
        tags: |
          ${{ steps.backend-meta.outputs.tags }}
          containers.github.scch.at/land-ooe/lx-worker:${{ steps.fetch_branch.outputs.branch }}-latest
        labels: |
          ${{ steps.backend-meta.outputs.labels }}
