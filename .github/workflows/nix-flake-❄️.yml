name: Nix Flake ❄️
on:
  workflow_dispatch:
  push:
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build and test
        run: nix build -L --show-trace

  docker:
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write          # required for cosign keyless signing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build Docker image
        run: nix build -L --show-trace .#dockerImage

      - name: Login to ghcr.io
        run: |
          skopeo login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Push to ghcr.io
        if: github.event_name != 'pull_request'
        id: push
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: |
          IMAGE_ARCHIVE=$(readlink -f result)
          # Sanitise branch name for use as Docker tag
          TAG=$(echo "$REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
          skopeo copy \
            docker-archive:"$IMAGE_ARCHIVE" \
            docker://"$IMAGE":"$TAG"
          skopeo copy \
            docker-archive:"$IMAGE_ARCHIVE" \
            docker://"$IMAGE":"${SHA::8}" \
            --digestfile /tmp/digest
          echo "digest=$(cat /tmp/digest)" >> "$GITHUB_OUTPUT"

      - name: Tag as latest
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_ARCHIVE=$(readlink -f result)
          skopeo copy \
            docker-archive:"$IMAGE_ARCHIVE" \
            docker://"$IMAGE":latest

      - uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'

      - name: Sign image with cosign
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
