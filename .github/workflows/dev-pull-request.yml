name: dev-pull-request
run-name: Pull request to dev branch by @${{ github.actor}}
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types: [ opened, reopened, synchronize]
jobs:
  maven-clean-validate-compile:
    uses: Land-OOE/general-workflows/.github/workflows/maven-clean-validate-compile.yml@main
    with:
      runner: KRAKAU
      context: ./Sources/WebServer
  call-parse-version-from-pom:
    uses: Land-OOE/general-workflows/.github/workflows/parse-version-from-pom.yml@main
    with:
      runner: KRAKAU
      context: ./Sources/WebServer
  docker-build-container:
    needs: [ maven-clean-validate-compile, call-parse-version-from-pom ]
    runs-on: [ KRAKAU ]
    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Extract branch name
      id: fetch_branch
      shell: bash
      run: |
        branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
        branch="${branch//\//_}"
        echo "branch=$branch" >> $GITHUB_OUTPUT
    - name: Login to github container registry
      uses: docker/login-action@v2
      with:
        registry: containers.github.scch.at
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Extract metadata (tags, labels) for backend
      id: backend-meta
      uses: docker/metadata-action@v4
      with:
        images: containers.github.scch.at/Land-OOE/prolog-web-server
        tags: |
          type=ref,event=branch,suffix=${{ needs.call-parse-version-from-pom.outputs.version }}-{{ date -s }}
          type=ref,event=tag,suffix=${{ needs.call-parse-version-from-pom.outputs.version }}-{{ date -s }}
    - name: generate .env.keys
      id: gen-env-keys
      env:
        DOTENV_PRIVATE_KEY: ${secrets.DOTENV_PRIVATE_KEY}
      run: Scripts/generate-env-keys.sh .
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        push: ${{ github.event_name != 'pull_request' }}
        file: ./Sources/WebServer/Dockerfile
        context: .
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: |
          ${{ steps.frontend-meta.outputs.tags }}
          containers.github.scch.at/land-ooe/prolog-web-server:${{ steps.fetch_branch.outputs.branch }}-latest
        labels: |
          ${{ steps.frontend-meta.outputs.labels }}
          containers.github.scch.at/Land-OOE/prolog-web-server:${GITHUB_REF##*/}-latest
