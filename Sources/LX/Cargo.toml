actix-cors = "0.7.1"
mime_guess = "2.0.5"
build-information = { path = "../BuildInformation" }
backend-interfaces = { path = "../BackendInterfaces" }
actix-web-middleware-keycloak-auth = "0.5.0"
derive-getters = "0.5.0"
wasm-bindgen = "0.2.100"
