name: Nix Flake ❄️
on:
 workflow_dispatch:
 push:
    branches:
      - master
 pull_request:
    branches:
      - master

jobs:
 build:
  permissions:
   contents: read
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4

   - uses: DeterminateSystems/nix-installer-action@v17

   - uses: DeterminateSystems/magic-nix-cache-action@v8

   - name: Build and test
     run: nix build -L --show-trace
