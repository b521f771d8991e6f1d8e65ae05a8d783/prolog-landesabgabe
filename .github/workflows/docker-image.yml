name: Docker Image CI

on:
  push:
    branches: [ "main", "stable" ]
  pull_request:
    branches: [ "main", "stable" ]
  workflow_dispatch:
# you can build manually on dev, but we do not want to spam the worker
# see here: https://github.scch.at/Land-OOE/prolog-landesabgabe/actions/workflows/docker-image.yml

jobs:
  build:
    runs-on: [ KRAKAU ]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Delete previous frontend builds
      uses: actions/delete-package-versions@v4
      continue-on-error: false
      with:
        package-name: 'prolog-landesabgabe-frontend'
        package-type: 'container'
        min-versions-to-keep: 10
    - name: Delete previous backend builds
      uses: actions/delete-package-versions@v4
      continue-on-error: false
      with:
        package-name: 'prolog-landesabgabe-backend'
        package-type: 'container'
        min-versions-to-keep: 10
    - name: Login to github container registry
      uses: docker/login-action@v2
      with:
        registry: containers.github.scch.at
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Extract metadata (tags, labels) for Docker
      id: frontend-meta
      uses: docker/metadata-action@v4
      with:
        images: containers.github.scch.at/land-ooe/prolog-landesabgabe-frontend
        tags: |
            type=ref,event=branch,pattern={{ date -s }}
            type=ref,event=tag,pattern={{ date -s }}
    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        push: true
        file: ./Infrastructure/WebFrontend.dockerfile
        context: .
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: ${{ steps.frontend-meta.outputs.tags }}
        labels: ${{ steps.frontend-meta.outputs.labels }}     
    - name: Extract metadata (tags, labels) for Docker
      id: backend-meta
      uses: docker/metadata-action@v4
      with:
        images: containers.github.scch.at/Land-OOE/prolog-landesabgabe-backend
        tags: |
            type=ref,event=branch,pattern={{ date -s }}
            type=ref,event=tag,pattern={{ date -s }}
    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        push: true
        file: ./Infrastructure/Worker.dockerfile
        context: .
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: ${{ steps.backend-meta.outputs.tags }}
        labels: ${{ steps.backend-meta.outputs.labels }}
