[package]
name = "backend"
version = "0.1.0"
edition = "2024"

[dependencies]
rust-embed = { version = "8.7.1"}
actix-web = "4.9.0"
log = "0.4.27"
serde = "1.0.217"
diesel = "2.2.9"
serde_json = "1.0.138"
reqwest = { version = "0.12.15", features = ["json", "rustls-tls"], default-features = false }
